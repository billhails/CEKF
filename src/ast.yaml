config:
    name: ast
    description: >-
        Abstract Syntax Tree (AST) structures generated by the parser. As this
        is close to the surface of the language, it is quite complicated. The
        complexity is reduced downstream by conversion to simple lambda form.
    parserInfo: true
    includes:
      - utils.h
    limited_includes:
      - bigint.h

structs:
    AstProg:
        meta:
            brief: AST Program
            description: >-
                The root structure of the AST, containing the program's
                definitions, nameSpaces and expressions.
        data:
            preamble: AstDefinitions
            nameSpaces: AstNameSpaceArray
            body: AstExpressions

    AstNest:
        meta:
            brief: AST Nest
            description: >-
                A nested structure in the AST, used for grouping expressions.
                Contains a list of definitions and a list of expressions.
        data:
            definitions: AstDefinitions
            expressions: AstExpressions

    AstNameSpaceImpl:
        meta:
            brief: AST NameSpace Implementation
            description: >-
                An implementation of a nameSpace in the AST, containing its
                unique file ID and definitions.
        data:
            id: FileId
            definitions: AstDefinitions
            replacements: SymbolMap=NULL

    AstNameSpace:
        meta:
            brief: AST NameSpace
            description: >-
                A flyweight reference to nameSpace in the AST, containing its
                index into an array of nameSpace implementations.
        data:
            symbol: HashSymbol
            reference: index

    AstDefinitions:
        meta:
            brief: AST Definitions
            description: >-
                A list of definitions in the AST, which can include function
                definitions, type definitions, and aliases.
        data:
            definition: AstDefinition
            next: AstDefinitions

    AstDefine:
        meta:
            brief: AST Definition
            description: >-
                A definition in the AST, which can be a function, type, alias,
                or macro.
        data:
            symbol: HashSymbol
            expression: AstExpression

    AstMultiDefine:
        meta:
            brief: AST Multi Definition
            description: >-
                A definition employing a tuple of symbols allowing multiple
                definitions to be made in a single assignment.
        data:
            symbols: AstSymbolList
            expression: AstExpression

    AstSymbolList:
        meta:
            brief: AST Symbol List
            description: >-
                A list of symbols used in a multi-definition.
        data:
            symbol: HashSymbol
            next: AstSymbolList

    AstAlias:
        meta:
            brief: AST Alias
            description: >-
                A type alias in the AST, which is a reference to another type.
        data:
            name: HashSymbol
            type: AstType

    AstExprAlias:
        meta:
            brief: AST Expression Alias
            description: >-
                An alias for an expression in the arguments to a function AST,
                which can be used to refer to an entire expression while still
                matching the expression.
        data:
            name: HashSymbol
            value: AstExpression

    AstAnnotatedSymbol:
        meta:
            brief: AST Annotated Symbol
            description: >-
                A symbol annotated with additional metadata. Used for hygienic
                operators where we need to track both the hygienic wrapper
                symbol and the original implementation to enable inlining of
                type constructors during lambda conversion.
        data:
            symbol: HashSymbol
            originalImpl: AstExpression
            isLazy: bool=false

    AstDefLazy:
        meta:
            brief: AST Lazy Function Definition
        data:
            name: HashSymbol
            definition: AstAltFunction

    AstTypeDef:
        meta:
            brief: AST Type Definition
            description: >-
                A type definition in the AST, which has a type signature and a
                body. Example: `<<typedef list(#t) { cons(#t, list(#t)) | nil
                }>>`
        data:
            typeSig: AstTypeSig
            typeBody: AstTypeBody

    AstTypeSig:
        meta:
            brief: AST Type Signature
            description: >-
                The signature of a user-defined type in the AST, which has a
                name and optional type variables. Example: `typedef <<list(#t)>>
                { cons(#t, list(#t)) | nil }`
        data:
            symbol: HashSymbol
            typeSymbols: AstTypeSymbols

    AstTypeSymbols:
        meta:
            brief: AST Type Symbols
            description: >-
                A list of type symbols used as arguments to a type sigature in
                the AST. Example: `typedef list(<<#t>>) { cons(#t, list(#t)) |
                nil }`
        data:
            typeSymbol: HashSymbol
            next: AstTypeSymbols

    AstTypeBody:
        meta:
            brief: AST Type Body
            description: >-
                The body of a user-defined type in the AST, which is a list of
                alternative type constructors. Example: `typedef list(#t) <<{
                cons(#t, list(#t)) | nil }>>`
        data:
            typeConstructor: AstTypeConstructor
            next: AstTypeBody

    AstTypeConstructor:
        meta:
            brief: AST Type Constructor
            description: >-
                An individual type constructor in the body of a type definition.
                Example: `typedef list(#t) { <<cons(#t, list(#t))>> | <<nil>> }`
        data:
            symbol: HashSymbol
            args: AstTypeConstructorArgs

    AstTypeFunction:
        meta:
            brief: AST Type Function
            description: >-
                A call to a type function used in the arguments to a type
                constructor. Example: `typedef list(#t) { cons(#t, <<list(#t)>>)
                | nil }`
        data:
            symbol: AstLookUpOrSymbol
            typeList: AstTypeList

    AstTypeList:
        meta:
            brief: AST Type List
            description: >-
                A list of types used as argument to type functions or type
                constructors, or as the body of a tuple. Examples: `typedef
                list(#t) { cons(<<#t, list(<<#t>>)>>) | nil }`
        data:
            type: AstType
            next: AstTypeList

    AstTypeMap:
        meta:
            brief: AST Type Map
            description: >-
                An alternative to a type list, a map of types which can be used
                for type functions or type constructors. Example: `typedef
                named_struct(#t) {
                    named<<{name: list(char), value: list(#t)}>> | oopsie
                }`
        data:
            key: HashSymbol
            type: AstType
            next: AstTypeMap

    AstType:
        meta:
            brief: AST Type
            description: >-
                A list of AST Type Clauses. Example: `typedef list(#t) {
                cons<<(#t, list(#t))>> | nil }`
        data:
            typeClause: AstTypeClause
            next: AstType

    AstCompositeFunction:
        meta:
            brief: AST Composite Function
            description: >-
                A composite function in the AST, which can be a normal function
                or a macro. Consists of a name and one or more alternative
                function bodies.
        data:
            unsafe: bool = false
            function: AstFunction
            next: AstCompositeFunction

    AstFunction:
        meta:
            brief: AST Function
            description: >-
                An individual function in the definition of a composite
                function. Contains a list of arguments and a body.
        data:
            argList: AstFargList
            nest: AstNest

    AstFargList:
        meta:
            brief: AST Formal Argument List
            description: >-
                A list of formal arguments in a function definition.
        data:
            arg: AstFarg
            next: AstFargList

    AstTaggedArgList:
        meta:
            brief: AST Tagged Argument List
            description: >-
                A list of arguments in a struct, where each argument is tagged
                with a name.
        data:
            tag: HashSymbol
            arg: AstFarg
            next: AstTaggedArgList

    AstAltArgs:
        meta:
            brief: AST Alternative Function Arguments
            description: >-
                A list of alternative arguments for a function in the AST. Used
                to represent multiple argument patterns with a single function
                body.
        data:
            argList: AstFargList
            next: AstAltArgs

    AstAltFunction:
        meta:
            brief: AST Alternative Function
            description: >-
                A single function with multiple alternative argument patterns.
        data:
            altArgs: AstAltArgs
            nest: AstNest

    AstUnpack:
        meta:
            brief: AST Unpack
            description: >-
                An unpack operation in the AST, which is used to unpack a tuple
                or a list into individual arguments.
        data:
            symbol: AstLookUpOrSymbol
            argList: AstFargList

    AstUnpackStruct:
        meta:
            brief: AST Unpack Struct
            description: >-
                An unpack operation for a struct in the AST, which unpacks the
                named fields of a struct into individual arguments.
        data:
            symbol: AstLookUpOrSymbol
            argList: AstTaggedArgList

    AstNamedArg:
        meta:
            brief: AST Named Argument
            description: >-
                A named argument in a function definition, which allows a
                complex argument to be both treated as a whole and destructured
                into its components.
        data:
            name: HashSymbol
            arg: AstFarg

    AstFunCall:
        meta:
            brief: AST Function Call
            description: >-
                A function call in the AST, which can be a call to a normal
                function, a macro or a builtin. Contains the function being
                called and its arguments.
        data:
            function: AstExpression
            arguments: AstExpressions
            isBuiltin: bool=false

    AstExpressions:
        meta:
            brief: AST Expressions
            description: >-
                A list of expressions in the AST, which can include function
                calls, literals, and other expressions. Used as the actual
                arguments in a function call.
        data:
            expression: AstExpression
            next: AstExpressions

    AstLookUpSymbol:
        meta:
            brief: AST LookUp Symbol
            description: >-
                A symbol that is looked up in the AST, which can be a variable
                or a function. Used to refer to variables or functions defined
                in other nameSpaces.
        data:
            nsId: int
            nsSymbol: HashSymbol
            symbol: HashSymbol

    AstLookUp:
        meta:
            brief: AST LookUp
            description: >-
                A lookUp operation in the AST, which evaluates an expression in
                another nameSpace.
        data:
            nsId: int
            nsSymbol: HashSymbol
            expression: AstExpression

    AstIff:
        meta:
            brief: AST If Expression
            description: >-
                An if expression in the AST, comprising a test expression and
                consequent and alternative branches.
        data:
            test: AstExpression
            consequent: AstNest
            alternative: AstNest

    AstPrint:
        meta:
            brief: AST Print Expression
            description: >-
                A print expression in the AST, which outputs a value to the
                console or standard output.
        data:
            exp: AstExpression

    AstTypeOf:
        meta:
            brief: AST TypeOf Expression
            description: >-
                A typeOf expression in the AST, which returns a string
                representation of the type of an expression.
        data:
            exp: AstExpression

    AstStruct:
        meta:
            brief: AST Struct
            description: >-
                A structure in the AST with named fields, when used as an actual
                argument to a function.
        data:
            symbol: AstLookUpOrSymbol
            expressions: AstTaggedExpressions

    AstTaggedExpressions:
        meta:
            brief: AST Tagged Expressions
            description: >-
                THe internal named components of an AstStruct, when used as an
                actual argument to a function.
        data:
            tag: HashSymbol
            expression: AstExpression
            next: AstTaggedExpressions

    AstSyntaxDecl:
        meta:
            brief: AST syntax declaration
            description: >-
                A durable syntax declaration that survives parsing and remains
                available until syntax lowering removes it from the AST.
        data:
            declarationId: int
            ruleName: HashSymbol
            surfaceHead: HashSymbol=NULL
            parameters: SymbolArray=NULL
            entryKind: AstSyntaxEntryKind=AST_SYNTAXENTRYKIND_TYPE_HELPER
            resultKind: AstSyntaxResultKind=AST_SYNTAXRESULTKIND_TYPE_EXPR
            alternatives: AstSyntaxAlternatives

    AstSyntaxAlternative:
        meta:
            brief: AST syntax alternative
            description: >-
                One ordered pattern plus its template body.
        data:
            patternItems: AstSyntaxPatternItems
            template: AstSyntaxTemplate

    AstSyntaxHole:
        meta:
            brief: AST syntax hole
            description: >-
                One bound syntax component in a syntax pattern.
        data:
            syntaxClass: AstSyntaxClass
            name: HashSymbol
            callTarget: HashSymbol=NULL
            callArguments: SymbolArray=NULL

    AstSyntaxBinding:
        meta:
            brief: Captured or inherited syntax binding
            description: >-
                One binding collected during syntax matching. All phase-1
                captures lower to ordinary AstExpression fragments.
        data:
            name: HashSymbol
            value: AstExpression
            inherited: bool=false

    AstSyntaxTemplateBinding:
        meta:
            brief: Template-aware syntax binding
            description: >-
                One syntax binding stored inside template IR so nested syntax
                uses can still instantiate bound expressions through the outer
                template.
        data:
            name: HashSymbol
            value: AstSyntaxTemplateExpr
            inherited: bool=false

    AstExprSyntaxUse:
        meta:
            brief: Expression-position syntax use
            description: >-
                A matched syntax use in expression position. It refers back to
                the declaration by id and stores the bindings captured at the
                use site.
        data:
            declarationId: int
            alternativeIndex: int
            bindings: AstSyntaxBindings

    AstDefSyntaxUse:
        meta:
            brief: Definition-position syntax use
            description: >-
                A matched syntax use in definition position.
        data:
            declarationId: int
            alternativeIndex: int
            bindings: AstSyntaxBindings

    AstSyntaxTemplate:
        meta:
            brief: Syntax template root
            description: >-
                A syntax template with an explicit result kind and a dedicated
                template IR rather than ordinary AST.
        data:
            resultKind: AstSyntaxResultKind
            expr: AstSyntaxTemplateExpr=NULL
            definition: AstSyntaxTemplateDefinition=NULL

    AstSyntaxLiteralRef:
        meta:
            brief: Definition-site literal reference
            description: >-
                An identifier written directly in the template. The prepare pass
                resolves it to the declaration-site binding.
        data:
            writtenName: HashSymbol
            resolvedName: HashSymbol=NULL

    AstSyntaxIntroducedBinder:
        meta:
            brief: Template-introduced binder
            description: >-
                A binder introduced by the template itself. The lowerer will
                freshen it and rewrite matching introduced references.
        data:
            binderId: int
            writtenName: HashSymbol

    AstSyntaxIntroducedRef:
        meta:
            brief: Reference to a template-introduced binder
            description: >-
                A reference tied to a previously parsed introduced binder by id.
        data:
            binderId: int

    AstSyntaxUnquote:
        meta:
            brief: Template unquote site
            description: >-
                A splice of a captured or inherited syntax binding.
        data:
            bindingName: HashSymbol
            syntaxClass: AstSyntaxClass

    AstSyntaxTemplateFunCall:
        meta:
            brief: Template function call
        data:
            function: AstSyntaxTemplateExpr
            arguments: AstSyntaxTemplateExprs

    AstSyntaxTemplateSyntaxUse:
        meta:
            brief: Template syntax use node
            description: >-
                A nested syntax use stored in template IR. It preserves the
                original declaration id and alternative index while carrying
                template-aware binding values.
        data:
            declarationId: int
            alternativeIndex: int
            bindings: AstSyntaxTemplateBindings

    AstSyntaxTemplateLookUp:
        meta:
            brief: Template namespace lookup
        data:
            nsId: int
            nsSymbol: HashSymbol
            expression: AstSyntaxTemplateExpr

    AstSyntaxTemplateIff:
        meta:
            brief: Template conditional expression
        data:
            test: AstSyntaxTemplateExpr
            consequent: AstSyntaxTemplateNest
            alternative: AstSyntaxTemplateNest

    AstSyntaxTemplatePrint:
        meta:
            brief: Template print expression
        data:
            expression: AstSyntaxTemplateExpr

    AstSyntaxTemplateTypeOf:
        meta:
            brief: Template typeof expression
        data:
            expression: AstSyntaxTemplateExpr

    AstSyntaxTemplateStruct:
        meta:
            brief: Template structure expression
        data:
            symbol: AstLookUpOrSymbol
            expressions: AstSyntaxTemplateTaggedExpressions

    AstSyntaxTemplateNest:
        meta:
            brief: Template nest
        data:
            definitions: AstSyntaxTemplateDefinitions
            expressions: AstSyntaxTemplateExprs

    AstSyntaxTemplateFunction:
        meta:
            brief: Template composite function
        data:
            function: AstSyntaxTemplateAltFunction
            next: AstSyntaxTemplateFunction=NULL
            unsafe: bool=false

    AstSyntaxTemplateAltFunction:
        meta:
            brief: Template alternative function body
        data:
            altArgs: AstSyntaxTemplateAltArgs
            nest: AstSyntaxTemplateNest

    AstSyntaxTemplateDefine:
        meta:
            brief: Template single definition
        data:
            symbol: AstSyntaxTemplateBinder
            expression: AstSyntaxTemplateExpr

    AstSyntaxTemplateMultiDefine:
        meta:
            brief: Template multi-definition
        data:
            symbols: AstSyntaxTemplateBinders
            expression: AstSyntaxTemplateExpr

    AstSyntaxTemplateDefLazy:
        meta:
            brief: Template lazy definition
        data:
            name: AstSyntaxTemplateBinder
            definition: AstSyntaxTemplateAltFunction

    AstSyntaxTemplateAlias:
        meta:
            brief: Template type alias
        data:
            name: AstSyntaxTemplateBinder
            type: AstType

    AstSyntaxTemplateTypeDef:
        meta:
            brief: Template typedef
        data:
            typeSig: AstTypeSig
            typeBody: AstTypeBody

    AstSyntaxTemplateNamedArg:
        meta:
            brief: Template named argument
        data:
            name: HashSymbol
            arg: AstSyntaxTemplateFarg

    AstSyntaxTemplateUnpack:
        meta:
            brief: Template unpack argument
        data:
            symbol: AstLookUpOrSymbol
            argList: AstSyntaxTemplateFargList

    AstSyntaxTemplateUnpackStruct:
        meta:
            brief: Template unpack-struct argument
        data:
            symbol: AstLookUpOrSymbol
            argList: AstSyntaxTemplateTaggedArgs

    AstSyntaxTemplateAltArgs:
        meta:
            brief: Template alternative argument list
        data:
            argList: AstSyntaxTemplateFargList
            next: AstSyntaxTemplateAltArgs=NULL

    AstSyntaxTemplateTaggedArg:
        meta:
            brief: Template tagged argument
        data:
            tag: HashSymbol
            arg: AstSyntaxTemplateFarg

    AstSyntaxTemplateTaggedExpression:
        meta:
            brief: Template tagged expression
        data:
            tag: HashSymbol
            expression: AstSyntaxTemplateExpr

    AstSyntaxTemplateDefinitions:
        meta:
            brief: Linked list of template definitions
        data:
            definition: AstSyntaxTemplateDefinition
            next: AstSyntaxTemplateDefinitions=NULL

enums:
    AstPosition:
        meta:
            brief: AST Position
            description: >-
                The fixity of a user-defined operator.
        data:
          - PREFIX
          - INFIX
          - POSTFIX

    AstSyntaxEntryKind:
        meta:
            brief: Syntax entry kind
            description: >-
                Whether a syntax rule is entered from expression position,
                definition position, or is a helper rule callable from other
                rules.
        data:
          - EXPR
          - DEF
          - HELPER

    AstSyntaxResultKind:
        meta:
            brief: Syntax result kind
            description: >-
                Whether the output of expanding a syntax rule is an expression
                or a definition.
        data:
          - EXPR
          - DEF

    AstSyntaxClass:
        meta:
            brief: Syntax hole class
            description: >-
                The syntactic class of a syntax hole, controlling what the
                parser will accept as a capture for that hole.
        data:
          - EXPR
          - NAME
          - NEST
          - STRING
          - TYPE
          - SYNTAX

unions:
    AstTypeConstructorArgs:
        meta:
            brief: AST Type Constructor Arguments
            description: >-
                The arguments to a type constructor in the AST. Can be a list of
                types or a map of types.
        data:
            list: AstTypeList
            map: AstTypeMap

    AstLookUpOrSymbol:
        meta:
            brief: AST LookUp or Symbol
            description: >-
                A reference to a symbol in the AST, which can be a direct symbol
                or a lookUp in another nameSpace.
        data:
            symbol: HashSymbol
            lookUp: AstLookUpSymbol

    AstDefinition:
        meta:
            brief: AST Definition
            description: >-
                A definition in the AST, which can be a function, type
                definition, alias, or lazy function.
        data:
            define: AstDefine
            multi: AstMultiDefine
            typeDef: AstTypeDef
            lazy: AstDefLazy
            alias: AstAlias
            blank: void_ptr
            builtinsSlot: void_ptr # Placeholder for builtins slot
            syntaxDecl: AstSyntaxDecl
            syntaxUse: AstDefSyntaxUse

    AstTypeClause:
        meta:
            brief: AST Type Clause
            description: >-
                A single argument to a type constructor or type function.
                Example: `typedef list(#t) { cons(<<#t>>, <<list(<<#t>>)>>) |
                nil }`
        data:
            integer: void_ptr
            character: void_ptr
            var: HashSymbol
            typeFunction: AstTypeFunction
            typeTuple: AstTypeList

    AstFarg:
        meta:
            brief: AST Formal Argument
            description: >-
                A formal argument in a function definition, which can be a
                variable, a wildCard, or a destructured argument.
        data:
            wildCard: void_ptr
            symbol: HashSymbol
            lookUp: AstLookUpSymbol
            named: AstNamedArg
            unpack: AstUnpack
            unpackStruct: AstUnpackStruct
            number: MaybeBigInt
            character: character
            tuple: AstFargList

    AstExpression:
        meta:
            brief: AST Expression
            description: >-
                Any expression in the AST.
        data:
            back: void_ptr
            wildCard: void_ptr
            alias: AstExprAlias
            annotatedSymbol: AstAnnotatedSymbol
            funCall: AstFunCall
            lookUp: AstLookUp
            symbol: HashSymbol
            number: MaybeBigInt
            character: character
            fun: AstCompositeFunction
            nest: AstNest
            iff: AstIff
            print: AstPrint
            typeOf: AstTypeOf
            tuple: AstExpressions
            env: void_ptr
            structure: AstStruct
            assertion: AstExpression
            error: AstExpression
            syntaxUse: AstExprSyntaxUse

    AstSyntaxTemplateBinder:
        meta:
            brief: Template binder occurrence
            description: >-
                A binder position in a template. Either a fresh introduced
                binder or an explicit unquote of a captured name.
        data:
            introduced: AstSyntaxIntroducedBinder
            unquote: AstSyntaxUnquote

    AstSyntaxTemplateNameRef:
        meta:
            brief: Template name reference
            description: >-
                A non-binder identifier occurrence in a template.
        data:
            literal: AstSyntaxLiteralRef
            introduced: AstSyntaxIntroducedRef
            unquote: AstSyntaxUnquote

    AstSyntaxPatternItem:
        meta:
            brief: Syntax pattern item stored in the AST
        data:
            quotedTerminal: HashSymbol
            typedHole: AstSyntaxHole

    AstSyntaxTemplateDefinition:
        meta:
            brief: Template definition node
        data:
            define: AstSyntaxTemplateDefine
            multi: AstSyntaxTemplateMultiDefine
            lazy: AstSyntaxTemplateDefLazy
            alias: AstSyntaxTemplateAlias
            typeDef: AstSyntaxTemplateTypeDef

    AstSyntaxTemplateExpr:
        meta:
            brief: Template expression node
            description: >-
                The template expression IR. It mirrors the expression forms
                currently needed by quote bodies while replacing raw names with
                explicit provenance-carrying variants.
        data:
            back: void_ptr
            wildCard: void_ptr
            nameRef: AstSyntaxTemplateNameRef
            number: MaybeBigInt
            character: character
            syntaxUse: AstSyntaxTemplateSyntaxUse
            funCall: AstSyntaxTemplateFunCall
            lookUp: AstSyntaxTemplateLookUp
            fun: AstSyntaxTemplateFunction
            nest: AstSyntaxTemplateNest
            iff: AstSyntaxTemplateIff
            print: AstSyntaxTemplatePrint
            typeOf: AstSyntaxTemplateTypeOf
            tuple: AstSyntaxTemplateExprs
            structure: AstSyntaxTemplateStruct
            assertion: AstSyntaxTemplateExpr
            error: AstSyntaxTemplateExpr

    AstSyntaxTemplateFarg:
        meta:
            brief: Template formal argument node
            description: >-
                Binder-aware mirror of AstFarg for function syntax quote bodies.
        data:
            wildCard: void_ptr
            binder: AstSyntaxTemplateBinder
            lookUp: AstLookUpSymbol
            named: AstSyntaxTemplateNamedArg
            unpack: AstSyntaxTemplateUnpack
            unpackStruct: AstSyntaxTemplateUnpackStruct
            number: MaybeBigInt
            character: character
            tuple: AstSyntaxTemplateFargList

arrays:
    AstNameSpaceArray:
        meta:
            brief: AST NameSpace Array
            description: >-
                An array of nameSpace implementations in the AST. Used to store
                the nameSpaces defined in the program.
        data:
            entries: AstNameSpaceImpl

    AstFileIdArray:
        meta:
            brief: AST File ID Array
            description: >-
                An array of file IDs used in the AST, which identify nameSpace
                files that have already been read.
        data:
            entries: FileId

    AstExpressionArray:
        meta:
            brief: AST Expression Array
            description: >-
                A simple array of AST expressions, used by the Pratt parser.
        data:
            entries: AstExpression

    AstSyntaxAlternatives:
        meta:
            brief: Array of syntax alternatives
        data:
            entries: AstSyntaxAlternative

    AstSyntaxBindings:
        meta:
            brief: Array of syntax bindings
        data:
            entries: AstSyntaxBinding

    AstSyntaxPatternItems:
        meta:
            brief: Array of syntax pattern items
        data:
            entries: AstSyntaxPatternItem

    AstSyntaxTemplateBinders:
        meta:
            brief: Array of template binders
        data:
            entries: AstSyntaxTemplateBinder

    AstSyntaxTemplateBindings:
        meta:
            brief: Array of template syntax bindings
        data:
            entries: AstSyntaxTemplateBinding

    AstSyntaxTemplateExprs:
        meta:
            brief: Array of template expressions
        data:
            entries: AstSyntaxTemplateExpr

    AstSyntaxTemplateFargList:
        meta:
            brief: Array of template formal arguments
        data:
            entries: AstSyntaxTemplateFarg

    AstSyntaxTemplateTaggedArgs:
        meta:
            brief: Array of template tagged arguments
        data:
            entries: AstSyntaxTemplateTaggedArg

    AstSyntaxTemplateTaggedExpressions:
        meta:
            brief: Array of template tagged expressions
        data:
            entries: AstSyntaxTemplateTaggedExpression

primitives: !include primitives.yaml

external:
  - !include utils.yaml
