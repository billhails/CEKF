config:
    name: emit_b
    description: New byteode emission utilities
    parserInfo: false
    limited_includes:
      - builtins.h
      - builtins_debug.h
      - emit.h
      - utils.h
      - emit_debug.h

structs:
    BEmitterContext:
        meta:
            brief: VisitorContext for emitMinExp
        data:
            currentBinding: HashSymbol
            lambdas: BBufferBag
            body: BBuffer
            builtIns: BuiltIns
            slots: SlotPool
            heap: SymbolArray # minheap
            activeSlots: int=0
            totalSlots: int=0
            maxReg: int=0
            currentReg: int=0
            needsUnprotect: bool=false

    BBuffer:
        meta:
            brief: A buffer with code, source locations and comments
        data:
            codes: UIntArray
            locations: BLocationArray
            comments: BCommentArray

    BLocation:
        meta:
            brief: A source code location associated with a bytecode
        data:
            index: index
            fileName: string
            lineNo: int

    BComment:
        meta:
            brief: text comment associated with a bytecode
        data:
            index: index
            text: SCharArray

unions:
    EmitBResult:
        meta:
            description: >
                Either a symbol from the slot pool, or a BBuffer containing an
                immediate expression which can be a constant or text that refers
                to other registers.
        data:
            var: HashSymbol
            buf: BBuffer
            constant: BBuffer

hashes:
    BBufferBag:
        data:
            entries: BBuffer

primitives: !include primitives.yaml

arrays:
    BResultArray:
        data:
            entries: EmitBResult

    BLocationArray:
        data:
            entries: BLocation

    BCommentArray:
        data:
            entries: BComment

external:
  - !include builtins.yaml
  - !include emit.yaml
  - !include utils.yaml
