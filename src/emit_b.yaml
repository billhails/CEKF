config:
    name: emit_b
    description: New byteode emission utilities
    parserInfo: false
    limited_includes:
      - emit.h
      - utils.h
      - emit_debug.h
      - cekfs_debug.h

structs:
    BEmitterContext:
        meta:
            brief: VisitorContext for emitMinExp
        data:
            lambdas: BBufferBag
            body: BBuffer
            context: EmitterContext

    BAssemblyPlan:
        meta:
            brief: Inputs to assembly of separate bytecode buffers
        data:
            buffers: BBufferBag
            order: SymbolArray
            entryLabel: HashSymbol

    BLayout:
        meta:
            brief: Final placement of buffers and labels after layout
        data:
            bufferBases: IndexMap
            globalLabels: IndexMap
            entryPoint: index

    BLinkedImage:
        meta:
            brief: Flattened bytecode image after assembly
        data:
            codes: UIntArray
            locations: BLocationArray
            comments: BCommentArray
            entryPoint: index

    BBuffer:
        meta:
            brief: A buffer with code, labels, unresolved fixups, source locations and
                comments
        data:
            codes: UIntArray
            labels: IndexMap
            fixups: BFixupArray
            locations: BLocationArray
            comments: BCommentArray

    BFixup:
        meta:
            brief: A patch site that must be resolved after layout
        data:
            index: index # word offset within this buffer to overwrite
            label: HashSymbol

    BLocation:
        meta:
            brief: A source code location associated with a bytecode
        data:
            index: index
            fileName: string
            lineNo: int

    BComment:
        meta:
            brief: text comment associated with a bytecode
        data:
            index: index
            text: SCharArray

    IntCondCase:
        meta:
            brief: individual integer case
        data:
            const_index: index # index into const table
            target: index # index into bytecode array

    CharCondCase:
        meta:
            brief: individual character case
        data:
            codepoint: character
            target: index # index into bytecode array

    IntCondSwitch:
        meta:
            brief: integer switch
        data:
            default_target: index
            cases: IntCondCaseArray

    CharCondSwitch:
        meta:
            brief: character switch
        data:
            default_target: index
            cases: CharCondCaseArray

unions:
    EmitBResult:
        meta:
            description: >
                Either a symbol from the slot pool, or a BBuffer containing an
                immediate expression which can be a constant or text that refers
                to other registers.
        data:
            var: HashSymbol
            buf: BBuffer
            constant: BBuffer

hashes:
    BBufferBag:
        data:
            entries: BBuffer

arrays:
    BResultArray:
        data:
            entries: EmitBResult

    BFixupArray:
        data:
            entries: BFixup

    BLocationArray:
        data:
            entries: BLocation

    BCommentArray:
        data:
            entries: BComment

    BConstantArray:
        data:
            entries: Value

    IntCondCaseArray:
        data:
            entries: IntCondCase

    CharCondCaseArray:
        data:
            entries: CharCondCase

    IntCondTable:
        data:
            entries: IntCondSwitch

    CharCondTable:
        data:
            entries: CharCondSwitch

enums:
    BBC:
        meta:
            brief: New bytecodes for the CPS branch
        data:
          - CALL_BUILTIN # builtin_id, dst, argv_reg
          - CHARCOND # test_reg, table_id
          - CLOSURE_NEW # dst, lambda_id
          - CLOSURE_SET_ENV # clo_reg, env_reg
          - DONE # exit_status
          - EXT # unpacked modifier for the next instruction
          - INTCOND # test_reg, table_id
          - JMP_FALSE # test_reg, target
          - JMP # target
          - LOAD_CHAR # dst, codepoint
          - LOAD_CONST # dst, const_index
          - LOAD_I32 # dst, imm32
          - LOAD_NONE # dst
          - MAKE_VEC # dst, count
          - MATCH # test_reg, table_id
          - MOVE # dst, src
          - PRIM_ADD # dst, left, right
          - PRIM_CANON # dst, left, right
          - PRIM_CMP # dst, left, right
          - PRIM_DIV # dst, left, right
          - PRIM_EQ # dst, left, right
          - PRIM_GCD # dst, left, right
          - PRIM_GE # dst, left, right
          - PRIM_GT # dst, left, right
          - PRIM_LCM # dst, left, right
          - PRIM_LE # dst, left, right
          - PRIM_LT # dst, left, right
          - PRIM_MOD # dst, left, right
          - PRIM_MUL # dst, left, right
          - PRIM_NE # dst, left, right
          - PRIM_POW # dst, left, right
          - PRIM_SUB # dst, left, right
          - PRIM_VEC # dst, index_reg, vec_reg
          - TAILCALL # clo_reg
          - VEC_GET_IMM # dst, index_imm, vec_reg
          - VEC_SET # vec_reg, index_imm, src

primitives: !include primitives.yaml

external:
  - !include emit.yaml
  - !include utils.yaml
  - !include cekfs.yaml
