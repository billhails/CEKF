config:
    name: emit_c
    description: Code emission utilities
    parserInfo: false
    limited_includes:
      - builtins.h
      - utils.h
      - utils_debug.h
      - builtins_debug.h

structs:
    EmitterContext:
        meta:
            brief: VisitorContext for emitMinExp
        data:
            currentBinding: HashSymbol
            lambdas: BufferBag
            body: opaque
            builtIns: BuiltIns
            slots: SlotPool
            heap: SymbolArray # minheap
            activeSlots: int=0
            totalSlots: int=0
            maxReg: int=0
            currentReg: int=0
            needsUnprotect: bool=false

    Slot:
        meta:
            description: Represents a register allocation
        data:
            isAvailable: bool
            text: SCharArray
            index: int

unions:
    EmitResult:
        meta:
            description: >
                Either a hash symbol representing a temp variable, or an Opaque
                EmitBuffer containing an immediate expression which can be
                a  constant or text that refers to variables.
        data:
            var: HashSymbol
            buf: opaque
            constant: opaque

hashes:
    BufferBag:
        data:
            entries: opaque

    SlotPool:
        data:
            entries: Slot

primitives: !include primitives.yaml

arrays:
    ResultArray:
        data:
            entries: EmitResult

external:
  - !include utils.yaml
  - !include builtins.yaml
