config:
    name: emit_c
    description: C code emission utilities
    parserInfo: false
    limited_includes:
      - emit.h
      - emit_debug.h

structs:
    CEmitterContext:
        meta:
            brief: VisitorContext for emitMinExp
        data:
            lambdas: CBufferBag
            body: opaque
            context: EmitterContext

unions:
    EmitCResult:
        meta:
            description: >
                Either a hash symbol representing a temp variable, or an Opaque
                EmitBuffer containing an immediate expression which can be
                a  constant or text that refers to variables.
        data:
            var: HashSymbol
            buf: opaque
            constant: opaque

hashes:
    CBufferBag:
        data:
            entries: opaque

primitives: !include primitives.yaml

arrays:
    CResultArray:
        data:
            entries: EmitCResult

external:
  - !include emit.yaml
