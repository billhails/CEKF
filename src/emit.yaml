config:
    name: emit
    description: Shared code emission utilities
    parserInfo: false
    limited_includes:
      - builtins.h
      - builtins_debug.h
      - utils.h
      - utils_debug.h

structs:

    Slot:
        meta:
            description: Represents a register allocation
        data:
            isAvailable: bool
            text: SCharArray
            index: int

    SlotAssign:
        meta:
            description: Records an assignment for later emission
        data:
            source: HashSymbol
            dest: HashSymbol

arrays:
    SlotAssignArray:
        data:
            entries: SlotAssign

hashes:
    SlotPool:
        data:
            entries: Slot

inline:
    structs:
        EmitterContext:
            meta:
                brief: Shared VisitorContext for emitMinExp
            data:
                currentBinding: HashSymbol
                builtIns: BuiltIns
                slots: SlotPool
                slotSymbols: SymbolArray
                heap: SymbolArray # minheap
                activeSlots: index=0
                totalSlots: index=0
                maxReg: index=0
                currentReg: index=0
                needsUnprotect: bool=false

primitives: !include primitives.yaml

external:
  - !include utils.yaml
  - !include builtins.yaml
