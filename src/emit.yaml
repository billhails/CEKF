config:
    name: emit
    description: Code emission utilities
    parserInfo: false
    limited_includes:
      - builtins.h
      - utils.h
      - utils_debug.h
      - builtins_debug.h

structs:
    EmitContext:
        meta:
            brief: VisitorContext for emitMinExp
        data:
            lambdas: BufferBag
            indexes: IntMap
            body: opaque
            builtIns: BuiltIns
            symbols: SymbolStash
            maxReg: int=0
            currentDepth: int=0

    SymbolStash:
        meta:
            brief: Tracks symbols still in scope but not active (re-usable)
        data:
            array: SymbolArray
            parent: SymbolStash

primitives: !include primitives.yaml

external:
  - !include utils.yaml
  - !include builtins.yaml
