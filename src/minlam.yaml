config:
    name: minlam
    description: Minimal AST after desugaring
    parserInfo: true
    includes:
      - utils.h
    limited_includes:
      - bigint.h
      - minlam_functions.h

structs:
    MinLam:
        meta:
            brief: A lambda expression
        data:
            args: SymbolList
            exp: MinExp
            cc: bool=false

    MinAnnotatedVar:
        meta:
            brief: A var with positional annotation
            description: Only introduced by the minlam_annotate step
        data:
            var: HashSymbol
            position: int

    MinExprList:
        meta:
            brief: A list of expressions
        data:
            exp: MinExp
            next: MinExprList

    MinPrimApp:
        meta:
            brief: A primitive operation application
        data:
            type: MinPrimOp
            exp1: MinExp
            exp2: MinExp

    MinApply:
        meta:
            brief: A function application.
        data:
            function: MinExp
            args: MinExprList
            isBuiltin: bool=false
            cc: bool=false

    MinIff:
        meta:
            brief: An if-then-else expression
        data:
            condition: MinExp
            consequent: MinExp
            alternative: MinExp

    MinCond:
        meta:
            brief: A conditional expression with multiple cases.
            description: >-
                Used internally by the generated TPMC code, the cases can be
                either integers (matcing type constructor tags) or characters
                (matching literal characters). The type of the value must match
                the type of the cases.
        data:
            value: MinExp
            cases: MinCondCases

    MinIntCondCases:
        meta:
            brief: Integer conditional cases
        data:
            constant: MaybeBigInt
            body: MinExp
            next: MinIntCondCases

    MinCharCondCases:
        meta:
            brief: Character conditional cases
        data:
            isDefault: bool=false
            constant: character
            body: MinExp
            next: MinCharCondCases

    MinMatch:
        meta:
            brief: An integer matching expression
            description: >-
                Matches an integer index against multiple lists of cases. This
                is specifically for the internal matching of type constructor
                tags in formal arguments.
        data:
            index: MinExp
            cases: MinMatchList

    MinMatchList:
        meta:
            brief: A list of pattern matching cases
        data:
            matches: MinIntList
            body: MinExp
            next: MinMatchList

    MinIntList:
        meta:
            brief: A list of integers
        data:
            item: int
            next: MinIntList

    MinLetRec:
        meta:
            brief: A letrec expression
        data:
            bindings: MinBindings
            body: MinExp

    MinBindings:
        meta:
            brief: List of bindings in a letrec expression
        data:
            var: HashSymbol
            val: MinExp
            arity: int=-1 # populated by minlam_curry, used by minlam_uncurry
            next: MinBindings

    MinAmb:
        meta:
            brief: An amb expression
            description: Desugared by minlam_amb
        data:
            left: MinExp
            right: MinExp

    MinAlphaEnv:
        meta:
            brief: An environment for alpha conversion
            description: not part of the IR
            parserInfo: false
        data:
            alphaTable: SymbolMap
            next: MinAlphaEnv

enums:
    MinPrimOp:
        meta:
            brief: Primitive operations
        data:
          - ADD
          - SUB
          - MUL
          - DIV
          - MOD
          - GCD
          - LCM
          - CANON
          - POW
          - EQ
          - NE
          - GT
          - LT
          - GE
          - LE
          - CMP
          - VEC

unions:
    MinExp:
        meta:
            brief: An expression
        data:
            amb: MinAmb # desugared by minlam_amb
            apply: MinApply
            args: MinExprList # only for the alternative ANF normalize_2 path; must not appear in the real MinExp pipeline
            avar: MinAnnotatedVar # only after final annotation
            back: void_ptr # desugared by minlam_amb
            bigInteger: MaybeBigInt
            bindings: MinBindings # so that ANF normalize can be uniformly typed
            callCC: MinExp # desugared by minlam_cps*
            character: character
            cond: MinCond
            done: int # exit status
            iff: MinIff
            lam: MinLam
            letRec: MinLetRec
            makeVec: MinExprList
            match: MinMatch
            prim: MinPrimApp
            sequence: MinExprList
            stdint: int
            var: HashSymbol

    MinCondCases:
        meta:
            brief: Cases for a MinCond
        data:
            integers: MinIntCondCases
            characters: MinCharCondCases

hashes:
    MinExpTable:
        meta:
            brief: Map from symbols to lambda expressions
            description: not part of the IR
        data:
            entries: MinExp

arrays:
    MinAlphaEnvArray:
        meta:
            brief: An array of alpha conversion environments per-namespace.
            description: >-
                Used to alpha-convert lookUp expressions. Not part of the IR.
        data:
            entries: MinAlphaEnv

    MinBindingsArray:
        meta:
            brief: Linearize bindings to allow iteration
            description: Not part of the IR.
        data:
            entries: MinBindings

primitives: !include primitives.yaml

external:
  - !include utils.yaml
